<script language=vbscript>

'188CB16F-82A4-4498-87D0-EBD8D9A00FB8

option explicit

dim strDestPath : strDestPath= "e:\E_Setups\"

sub make_app(appname,strSrcPath,bPack)
	dim appdb
	set appdb = createobject("navoappdb.appdbmanager")
	appdb.create appname,strSrcPath,1	'jeśli katalog jest inny to go zmień
	appdb.mode = 1 'zmień na tryb użytkownika
	dim strDescription
	strDescription = appname	'na razie
	if bPack then
		appdb.pack strDestPath+appname+".npx",strDestPath+appname+".npi",strDescription
	end if
	appdb.mode = 0 'zmień na tryb programisty
end sub


sub compiledo(appname)
	dim appdb
	set appdb = createobject("navoappdb.appdbmanager")
	appdb.init appname
	appdb.compiledataobj
end sub

sub drop_app(appname)
	if msgbox("czy na pewno usunąć " + appname,vbIconQuestion or vbYesNo) <> vbYes then
		exit sub
	end if
	dim appdb
	set appdb = createobject("navoappdb.appdbmanager")
	appdb.drop appname
	msgbox appname + " usunięta!"
end sub

	on error resume next
	make_app "EuroBusiness 5.0","C:\NAVO2002\sprzedaz", false

end function
